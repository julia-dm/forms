<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Forms</title>
</head>
<body>
    <div class="container">
        <div class="form_container">
        <div class="form_text">
<h1>Besoin <br>d'informations ?</h1>
<p>Conctactez-nous ! Notre equipe vous repond rapidement.</p>
        </div>
        <div class="form">
<form action="">
    <p>Nom</p>
    <label for="name"></label>
    <input type="text" id="name" name="name" placeholder="Dupot">
    <div class="forms_p">
    <p>Email</p>
    <p>Tel</p>
</div>
    <div class="row">
    <label for="email"></label>
    <input type="email" id="email" name="email" placeholder="email@gmail.com">

  
    <label for="tel"></label>
    <input type="tel" id="tel" name="tel" placeholder="0102030405">
</div>
    <p>Message</p>
    <label for="message"></label>
    <textarea name="message" id="message" placeholder="Redigez votre message"></textarea>

    <button type="submit">ENVOYER LE MESSAGE</button>
</form>
        </div>
    </div>
    </div>
</body>
</html>
